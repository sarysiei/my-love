<!DOCTYPE html>
<html lang="en">
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/editor.css">
  <title>3D Rotating Gallery + Fireworks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Battambang&display=swap" rel="stylesheet">
 </head>
<body>
  <!--fireworks canvas sits behind everything-->
  <canvas id="canvas"></canvas>
  <h1 class="khmer-title">អ្នកគ្រូ សារី លីដា
    ឯកទេស កុំព្យូទ័រ
  </h1>

  <!--3D rotating image gallery-->
  <div class="box">
    <span style="--i:1;"><img src="photo-1.jpg" alt=""></span>
    <span style="--i:2;"><img src="photo_2.jpg" alt=""></span>
    <span style="--i:3;"><img src="photo_3.jpg" alt=""></span>
    <span style="--i:4;"><img src="photo_4.jpg" alt=""></span>
    <span style="--i:5;"><img src="pic4.jpg" alt=""></span>
    <span style="--i:6;"><img src="pic1.jpg" alt=""></span>
  </div>
  <script src="text/javascript"></script>
</body>
</html>
